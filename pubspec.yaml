name: smart_expense_tracker
description: "A production-ready Smart Expense Tracker application with clean architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  lucide_icons: ^0.257.0
  phosphor_flutter: ^2.0.1

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.3+1

  # Navigation
  go_router: ^17.2.3

  # Database
  hive_ce_flutter: ^2.3.4
  hive_ce: ^2.19.3

  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^1.2.0

  # Authentication
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  firebase_core: 4.11.0
  firebase_auth: 6.5.4
  google_sign_in: 6.2.1
  cloud_firestore: ^6.6.0

  # Export
  pdf: ^3.11.1
  csv: ^6.0.0
  share_plus: ^12.0.2
  path_provider: ^2.1.5

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^18.0.1

  # UI
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  hive_ce_generator: ^1.9.2
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons: ^0.14.4
# custom_lint: ^0.7.1
# riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/splash/Splash.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/splash/launcherr.png"